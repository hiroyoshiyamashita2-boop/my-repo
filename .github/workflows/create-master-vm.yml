name: Create Master VM (Bicep)

on:
  workflow_dispatch:
    inputs:
      resourceGroupName:
        description: 'Resource Group name'
        required: true
        type: string

      snapshotName:
        description: 'Snapshot name (e.g. P906VMJW01-20260310-BeforeSysprep)'
        required: true
        type: string

      location:
        description: 'Azure location (e.g. japanwest)'
        required: true
        type: string

      deployDate:
        description: 'Deployment date (YYYYMMDD)'
        required: true
        type: string

      adminPassword:
        description: 'Local admin password for the target VM'
        required: true
        type: string   # ⚠ GitHub UIではマスクされません

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      #----------------------------------------
      # 既存 VM チェック
      #----------------------------------------
      - name: Check existing VM
        shell: bash
        run: |
          set -e

          SNAPSHOT_NAME="${{ inputs.snapshotName }}"
          VM_BASE_NAME="${SNAPSHOT_NAME%%-*}"

          if az vm show \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --name "${VM_BASE_NAME}" \
            --query name \
            --output tsv > /dev/null 2>&1; then
            echo "ERROR: VM '${VM_BASE_NAME}' already exists."
            exit 1
          fi

      #----------------------------------------
      # Phase 1: Master VM 作成
      #----------------------------------------
      - name: Deploy Master VM with Bicep
        shell: bash
        run: |
          set -e

          SNAPSHOT_NAME="${{ inputs.snapshotName }}"
          VM_BASE_NAME="${SNAPSHOT_NAME%%-*}"

          az deployment group create \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/deploy-master-vm.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              snapshotName="${SNAPSHOT_NAME}" \
              vmName="${VM_BASE_NAME}" \
              deployDate="${{ inputs.deployDate }}"

      #----------------------------------------
      # 起動待ち
      #----------------------------------------
      - name: Wait for VM to be fully running
        shell: bash
        run: |
          echo "Waiting for VM to be in running state..."
          SNAPSHOT_NAME="${{ inputs.snapshotName }}"
          VM_BASE_NAME="${SNAPSHOT_NAME%%-*}"

          for i in {1..30}; do
            STATE=$(az vm get-instance-view \
              --resource-group "${{ inputs.resourceGroupName }}" \
              --name "${VM_BASE_NAME}" \
              --query "instanceView.statuses[?starts_with(code,'PowerState/')].displayStatus" \
              --output tsv)

            echo "Current VM state: $STATE"

            if [[ "$STATE" == "VM running" ]]; then
              echo "VM is running."
              exit 0
            fi

            sleep 20
          done

          echo "ERROR: VM did not reach 'running' state in time."
          exit 1

      #----------------------------------------
      # Phase 2: Run Command（OS 設定 + パスワードリセット）
      #----------------------------------------
      - name: Run Command - Configure OS State
        shell: bash
        run: |
          set -e

          SNAPSHOT_NAME="${{ inputs.snapshotName }}"
          VM_BASE_NAME="${SNAPSHOT_NAME%%-*}"

          az deployment group create \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/runcommand-configure-os-state.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              vmName="${VM_BASE_NAME}" \
              adminPassword="${{ inputs.adminPassword }}"
