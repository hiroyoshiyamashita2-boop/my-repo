name: Create Master VM and Configure OS (Bicep + RunCommand)

on:
  workflow_dispatch:
    inputs:
      resourceGroupName:
        description: 'Resource Group name'
        required: true
        type: string

      vmName:
        description: 'New Master VM name (既存の場合はエラー)'
        required: true
        type: string

      snapshotName:
        description: 'Source snapshot name'
        required: true
        type: string

      location:
        description: 'Azure location (e.g. japanwest)'
        required: true
        type: string

      deployDate:
        description: 'Deployment date (YYYYMMDD)'
        required: true
        type: string

      adminPassword:
        description: 'Local administrator password (VMごとに指定)'
        required: true
        type: string   # GitHub UIではマスクされません（仕様）

permissions:
  id-token: write
  contents: read

jobs:
  create-master-vm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -------------------------------------------------
      # 事前チェック：VM が存在したら異常終了
      # -------------------------------------------------
      - name: Verify VM does not already exist
        shell: bash
        run: |
          if az vm show \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --name "${{ inputs.vmName }}" \
            --query name -o tsv >/dev/null 2>&1; then
            echo "ERROR: VM '${{ inputs.vmName }}' already exists. This job creates a NEW Master VM only."
            exit 1
          fi

          echo "VM does not exist. OK to proceed."

      # -------------------------------------------------
      # Phase 1: Master VM 作成
      # -------------------------------------------------
      - name: Deploy Master VM with Bicep
        shell: bash
        run: |
          az deployment group create \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/deploy-master-vm.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              snapshotName="${{ inputs.snapshotName }}" \
              vmName="${{ inputs.vmName }}" \
              deployDate="${{ inputs.deployDate }}"

      # -------------------------------------------------
      # VM 起動待ち
      # -------------------------------------------------
      - name: Wait for VM to be running
        shell: bash
        run: |
          echo "Waiting for VM to be in running state..."

          for i in {1..40}; do
            STATE=$(az vm get-instance-view \
              --resource-group "${{ inputs.resourceGroupName }}" \
              --name "${{ inputs.vmName }}" \
              --query "instanceView.statuses[?starts_with(code,'PowerState/')].displayStatus" \
              --output tsv)

            echo "Current VM state: $STATE"

            if [[ "$STATE" == "VM running" ]]; then
              echo "VM is running."
              exit 0
            fi

            sleep 30
          done

          echo "ERROR: VM did not reach running state."
          exit 1

      # -------------------------------------------------
      # Phase 2-1: Run Command（Pre-Reboot）
      # -------------------------------------------------
      - name: Run Command - Pre Reboot (Configure OS + Windows Update)
        shell: bash
        run: |
          az deployment group create \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/runcommand-configure-os-state.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              vmName="${{ inputs.vmName }}" \
              adminPassword="${{ inputs.adminPassword }}"

      # -------------------------------------------------
      # Windows Update 後の再起動待ち
      # -------------------------------------------------
      - name: Wait for VM reboot completion
        shell: bash
        run: |
          echo "Waiting for VM reboot completion..."

          for i in {1..40}; do
            STATE=$(az vm get-instance-view \
              --resource-group "${{ inputs.resourceGroupName }}" \
              --name "${{ inputs.vmName }}" \
              --query "instanceView.statuses[?starts_with(code,'PowerState/')].displayStatus" \
              --output tsv)

            echo "Current VM state: $STATE"

            if [[ "$STATE" == "VM running" ]]; then
              echo "VM reboot completed successfully."
              exit 0
            fi

            sleep 30
          done

          echo "ERROR: VM did not return to running state after reboot."
          exit 1

      # -------------------------------------------------
      # Phase 2-2: Run Command（Post-Reboot）
      # -------------------------------------------------
      - name: Run Command - Post Reboot (Windows Update Verification)
        shell: bash
        run: |
          az deployment group create \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/runcommand-windowsupdate-postreboot.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              vmName="${{ inputs.vmName }}"
