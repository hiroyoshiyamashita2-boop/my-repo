name: Create Master VM and Configure OS (From Snapshot)

on:
  workflow_dispatch:
    inputs:
      resourceGroupName:
        description: 'Resource Group name'
        required: true
        type: string

      snapshotName:
        description: 'Snapshot name (e.g. P906VMJW02-20260421-BeforeSysprep)'
        required: true
        type: string

      location:
        description: 'Azure location (e.g. japanwest)'
        required: true
        type: string

      deployDate:
        description: 'Deployment date (YYYYMMDD)'
        required: true
        type: string

      adminPassword:
        description: 'Local administrator password'
        required: true
        type: string   # GitHub UI ではマスクされません（仕様）

permissions:
  id-token: write
  contents: read

jobs:
  create-master-vm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -------------------------------------------------
      # VM 名を snapshotName から決定
      # -------------------------------------------------
      - name: Derive VM name from snapshot name
        id: derive
        shell: bash
        run: |
          SNAPSHOT_NAME="${{ inputs.snapshotName }}"
          VM_NAME="${SNAPSHOT_NAME%%-*}"

          if [[ -z "$VM_NAME" ]]; then
            echo "ERROR: Failed to derive VM name from snapshotName."
            exit 1
          fi

          echo "Derived VM name: $VM_NAME"
          echo "vmName=$VM_NAME" >> $GITHUB_OUTPUT

      # -------------------------------------------------
      # 事前チェック：VM が存在したら異常
      # -------------------------------------------------
      - name: Verify VM does not already exist
        shell: bash
        run: |
          if az vm show \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --name "${{ steps.derive.outputs.vmName }}" \
            --query name -o tsv >/dev/null 2>&1; then
            echo "ERROR: VM '${{ steps.derive.outputs.vmName }}' already exists."
            exit 1
          fi

          echo "VM does not exist. OK to proceed."

      # -------------------------------------------------
      # Phase 1: Master VM 作成
      # -------------------------------------------------
      - name: Deploy Master VM with Bicep
        shell: bash
        run: |
          az deployment group create \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/deploy-master-vm.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              snapshotName="${{ inputs.snapshotName }}" \
              vmName="${{ steps.derive.outputs.vmName }}" \
              deployDate="${{ inputs.deployDate }}"

      # -------------------------------------------------
      # VM 起動待ち
      # -------------------------------------------------
      - name: Wait for VM to be running
        shell: bash
        run: |
          echo "Waiting for VM startup..."

          for i in {1..40}; do
            STATE=$(az vm get-instance-view \
              --resource-group "${{ inputs.resourceGroupName }}" \
              --name "${{ steps.derive.outputs.vmName }}" \
              --query "instanceView.statuses[?starts_with(code,'PowerState/')].displayStatus" \
              --output tsv)

            echo "Current VM state: $STATE"

            if [[ "$STATE" == "VM running" ]]; then
              echo "VM is running."
              exit 0
            fi

            sleep 30
          done

          echo "ERROR: VM did not reach running state."
          exit 1

      # -------------------------------------------------
      # Phase 2-1: Run Command（Pre-Reboot）
      # -------------------------------------------------
      - name: Run Command - Pre Reboot (Configure OS + Windows Update)
        shell: bash
        run: |
          az deployment group create \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/runcommand-configure-os-state.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              vmName="${{ steps.derive.outputs.vmName }}" \
              adminPassword="${{ inputs.adminPassword }}"

      # -------------------------------------------------
      # 再起動待ち（Windows Update 後）
      # -------------------------------------------------
      - name: Wait for VM reboot completion
        shell: bash
        run: |
          echo "Waiting for VM reboot..."

          for i in {1..40}; do
            STATE=$(az vm get-instance-view \
              --resource-group "${{ inputs.resourceGroupName }}" \
              --name "${{ steps.derive.outputs.vmName }}" \
              --query "instanceView.statuses[?starts_with(code,'PowerState/')].displayStatus" \
              --output tsv)

            echo "Current VM state: $STATE"

            if [[ "$STATE" == "VM running" ]]; then
              echo "VM reboot completed."
              exit 0
            fi

            sleep 30
          done

          echo "ERROR: VM did not return to running state after reboot."
          exit 1

      # -------------------------------------------------
      # Phase 2-2: Run Command（Post-Reboot）
      # -------------------------------------------------
      - name: Run Command - Post Reboot (Windows Update Verification)
        shell: bash
        run: |
          az deployment group create \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/runcommand-windowsupdate-postreboot.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              vmName="${{ steps.derive.outputs.vmName }}"

      # -------------------------------------------------
      # Phase 3: 完了後に VM を Stop（Deallocate）
      # -------------------------------------------------
      - name: Stop and Deallocate VM after successful completion
        shell: bash
        run: |
          echo "Deallocating VM after successful OS configuration..."

          az vm deallocate \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --name "${{ steps.derive.outputs.vmName }}"

          echo "VM successfully deallocated."
