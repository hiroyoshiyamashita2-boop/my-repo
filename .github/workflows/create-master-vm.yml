name: Create Master VM (Bicep)

on:
  workflow_dispatch:
    inputs:
      resourceGroupName:
        description: 'Resource Group name'
        required: true
        type: string

      snapshotName:
        description: 'Snapshot name (e.g. P906VMJW01-20260310-BeforeSysprep)'
        required: true
        type: string

      location:
        description: 'Azure location (e.g. japanwest)'
        required: true
        type: string

      deployDate:
        description: 'Deployment date (YYYYMMDD)'
        required: true
        type: string

      adminPassword:
        description: 'Local administrator password (VMごとに指定)'
        required: true
        type: string   # ※ GitHub UI ではマスクされません（仕様）

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -------------------------------------------------
      # VM 名決定（Snapshot 名から派生）
      # -------------------------------------------------
      - name: Set VM name
        id: setvm
        shell: bash
        run: |
          SNAPSHOT_NAME="${{ inputs.snapshotName }}"
          VM_BASE_NAME="${SNAPSHOT_NAME%%-*}"
          echo "vmName=$VM_BASE_NAME" >> $GITHUB_OUTPUT

      # -------------------------------------------------
      # Phase 2-1: Run Command（Pre-Reboot）
      # ・PWリセット
      # ・Paging 設定
      # ・Windows Update 実行
      # ・再起動
      # -------------------------------------------------
      - name: Run Command - Pre Reboot (Configure OS + Windows Update)
        shell: bash
        run: |
          az deployment group create \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/runcommand-configure-os-state.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              vmName="${{ steps.setvm.outputs.vmName }}" \
              adminPassword="${{ inputs.adminPassword }}"

      # -------------------------------------------------
      # 再起動待ち（Windows Update 後）
      # -------------------------------------------------
      - name: Wait for VM reboot completion
        shell: bash
        run: |
          echo "Waiting for VM reboot completion..."

          VM_NAME="${{ steps.setvm.outputs.vmName }}"

          for i in {1..40}; do
            STATE=$(az vm get-instance-view \
              --resource-group "${{ inputs.resourceGroupName }}" \
              --name "$VM_NAME" \
              --query "instanceView.statuses[?starts_with(code,'PowerState/')].displayStatus" \
              --output tsv)

            echo "Current VM state: $STATE"

            if [[ "$STATE" == "VM running" ]]; then
              echo "VM reboot completed successfully."
              exit 0
            fi

            sleep 30
          done

          echo "ERROR: VM did not return to running state after reboot."
          exit 1

      # -------------------------------------------------
      # Phase 2-2: Run Command（Post-Reboot）
      # ・Windows Update 完了確認
      # -------------------------------------------------
      - name: Run Command - Post Reboot (Windows Update Verification)
        shell: bash
        run: |
          az deployment group create \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/runcommand-windowsupdate-postreboot.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              vmName="${{ steps.setvm.outputs.vmName }}"
