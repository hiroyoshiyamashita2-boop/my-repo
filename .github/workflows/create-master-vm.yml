name: Create Master VM and Configure OS (From Snapshot)

on:
  workflow_dispatch:
    inputs:
      resourceGroupName:
        description: 'Resource Group name'
        required: true
        type: string

      snapshotName:
        description: 'Snapshot name (e.g. P906VMJW02-20260421-BeforeSysprep)'
        required: true
        type: string

      location:
        description: 'Azure location (e.g. japanwest)'
        required: true
        type: string

      deployDate:
        description: 'Deployment date (YYYYMMDD)'
        required: true
        type: string

      adminPassword:
        description: 'Local administrator password'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  create-master-vm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -------------------------------------------------
      # VM 名を snapshotName から決定
      # -------------------------------------------------
      - name: Derive VM name from snapshot name
        id: derive
        shell: bash
        run: |
          SNAPSHOT_NAME="${{ inputs.snapshotName }}"
          VM_NAME="${SNAPSHOT_NAME%%-*}"

          if [[ -z "$VM_NAME" ]]; then
            echo "ERROR: Failed to derive VM name."
            exit 1
          fi

          echo "vmName=$VM_NAME" >> $GITHUB_OUTPUT

      # -------------------------------------------------
      # Phase 1: VM 作成
      # -------------------------------------------------
      - name: Deploy Master VM
        shell: bash
        run: |
          az deployment group create \
            --name "deploy-master-vm-${{ inputs.deployDate }}" \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/deploy-master-vm.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              snapshotName="${{ inputs.snapshotName }}" \
              vmName="${{ steps.derive.outputs.vmName }}" \
              deployDate="${{ inputs.deployDate }}"

      # -------------------------------------------------
      # 起動待ち
      # -------------------------------------------------
      - name: Wait for VM to be running
        shell: bash
        run: |
          for i in {1..40}; do
            STATE=$(az vm get-instance-view \
              --resource-group "${{ inputs.resourceGroupName }}" \
              --name "${{ steps.derive.outputs.vmName }}" \
              --query "instanceView.statuses[?starts_with(code,'PowerState/')].displayStatus" \
              --output tsv)

            echo "Current VM state: $STATE"

            if [[ "$STATE" == "VM running" ]]; then
              exit 0
            fi

            sleep 30
          done

          exit 1

      # -------------------------------------------------
      # Phase 2-1: Pre-Reboot RunCommand（★ デプロイ名を一意化）
      # -------------------------------------------------
      - name: Run Command - Pre Reboot
        shell: bash
        run: |
          az deployment group create \
            --name "runcommand-pre-${{ inputs.deployDate }}" \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/runcommand-configure-os-state.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              vmName="${{ steps.derive.outputs.vmName }}" \
              adminPassword="${{ inputs.adminPassword }}"

      # -------------------------------------------------
      # 再起動待ち
      # -------------------------------------------------
      - name: Wait for VM reboot completion
        shell: bash
        run: |
          for i in {1..40}; do
            STATE=$(az vm get-instance-view \
              --resource-group "${{ inputs.resourceGroupName }}" \
              --name "${{ steps.derive.outputs.vmName }}" \
              --query "instanceView.statuses[?starts_with(code,'PowerState/')].displayStatus" \
              --output tsv)

            echo "Current VM state: $STATE"

            if [[ "$STATE" == "VM running" ]]; then
              exit 0
            fi

            sleep 30
          done

          exit 1

      # -------------------------------------------------
      # Phase 2-2: Post-Reboot RunCommand（★ デプロイ名を一意化）
      # -------------------------------------------------
      - name: Run Command - Post Reboot
        shell: bash
        run: |
          az deployment group create \
            --name "runcommand-post-${{ inputs.deployDate }}" \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --template-file infra/vm/runcommand-windowsupdate-postreboot.bicep \
            --parameters \
              location="${{ inputs.location }}" \
              vmName="${{ steps.derive.outputs.vmName }}"

      # -------------------------------------------------
      # Phase 3: Deallocate
      # -------------------------------------------------
      - name: Stop and Deallocate VM
        shell: bash
        run: |
          az vm deallocate \
            --resource-group "${{ inputs.resourceGroupName }}" \
            --name "${{ steps.derive.outputs.vmName }}"
